<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario - Crear Cuenta</title>
    <link rel="stylesheet" href="estilos/estilos.css">
    
</head>
<body>
    <header>
        <h1>Formulario de creación de cuenta</h1>
    </header>
    <main>
        <form id="formularioCuenta">
            <div>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div>
                <label for="apellido1">Apellido 1:</label>
                <input type="text" id="apellido1" name="apellido1" required>
            </div>
             <div>
                <label for="apellido2">Apellido 2:</label>
                <input type="text" id="apellido2" name="apellido2" >
            </div>
            <div>
                <label for="fechaNacimiento">Fecha de nacimiento:</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
            </div>
            <div>
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="foto">Foto de perfil:</label>
                <input type="file" name="foto" id="foto" accept="image/*">
            </div>
            <img id="preview" width="120">
            <div>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div>
                <label for="repetirPassword">Repetir contraseña:</label>
                <input type="password" id="repetirPassword" name="repetirPassword" required>
            </div>
            <div>
                <button type="submit">Crear cuenta</button>
            </div>

        </form>
    </main>
    <footer>
        <p>Proyecto realizado por Borja Prieto Valera</p>
    </footer>
    <script src="js/script.js"></script>
    
</body>
</html>
